<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Ryan Gavin Balares">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

        <title>Q4 1st & 2nd Graded - Movie Rating CRUD</title>
    <head>
    <body>
        <h3>Movie Addition Form</h3>
        <form>
            <label for="movie-name">Movie Name:</label><br>
            <input type="text" id="movie-name" name="movie-name" required>
            <br>
            <label for="movie-year">Year Created:</label><br>
            <input type="number" id="movie-year" name="movie-year" required>
            <br>
            <label for="movie-genre">Genre:</label><br>
            <input type="text" id="movie-genre" name="movie-genre" required><br>
            <input type="submit" value="Submit">
            <br>
        </form>
    </body>
</html>
