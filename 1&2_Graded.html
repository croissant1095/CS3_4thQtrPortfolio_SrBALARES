<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Ryan Gavin Balares">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="G1G2.css">
        <title>Q4 1st & 2nd Graded - Movie Rating CRUD</title>
    <head>
    <body>
        <h3>Movie Addition Form</h3>
        <form>
            <label for="movie-name">Movie Name:</label><br>
            <input type="text" id="movie-name" name="movie-name" required>
            <br>
            <label for="movie-year">Year Created:</label><br>
            <input type="number" id="movie-year" name="movie-year" required>
            <br>
            <label for="movie-genre">Genre:</label><br>
            <select name="movie-genre" id="movie-genre" required>
                <option value=""> --Select-- </option>
                <option value="Action">Action</option>
                <option value="Horror">Horror</option>
                <option value="Comedy">Comedy</option>
                <option value="Romance">Romance</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Animation">Animation</option>
            </select><br>
            <input type="submit" value="Add Movie">
            <br>
        </form><br>
        <h3>Movie List</h3>
        <table id="movies-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Year</th>
                    <th>Genre</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <script>
            function loadMovies() {
                const raw = localStorage.getItem("movies");
                return raw ? JSON.parse(raw) : [];
            }

            function saveMovies(movies) {
                localStorage.setItem("movies", JSON.stringify(movies));
            }

            // found an alternative sol'n for rendering table :)
            function renderMoviesTable() {
                const movies = loadMovies();
                const tbody = document.querySelector('#movies-table tbody');
                tbody.innerHTML = '';

                movies.forEach(movie => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${movie.name}</td>
                        <td>${movie.year}</td>
                        <td>${movie.genre}</td>
                    `;
                    tbody.appendChild(row);
                });
            }
            document.querySelector('form').addEventListener('submit', function(event) {
                event.preventDefault();
                const name = document.getElementById('movie-name').value.trim();
                const year = document.getElementById('movie-year').value.trim();
                const genre = document.getElementById('movie-genre').value.trim();
                const movieObj = {
                    name: name, 
                    year: year,
                    genre: genre
                };
                console.log(movieObj)
                let moviesCurrent = loadMovies();
                moviesCurrent.push(movieObj);
                saveMovies(moviesCurrent);
                renderMoviesTable();
                event.target.reset();
            });
            window.addEventListener('DOMContentLoaded', renderMoviesTable);
        </script>
    </body>

</html>
