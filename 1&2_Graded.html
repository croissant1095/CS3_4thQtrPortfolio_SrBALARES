<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Ryan Gavin Balares">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="G1G2.css">
        <title>Q4 1st & 2nd Graded - Movie Rating CRUD</title>
    <head>
    <body>
        <h3>Movie Addition Form</h3>
        <form>
            <label for="movieName">Movie Name:</label><br>
            <input type="text" id="movieName" name="movieName" required>
            <br>
            <label for="movieYear">Year Created:</label><br>
            <input type="number" id="movieYear" name="movieYear" required>
            <br>
            <label for="movieGenre">Genre:</label><br>
            <select name="movieGenre" id="movieGenre" required>
                <option value=""> --Select-- </option>
                <option value="Action">Action</option>
                <option value="Horror">Horror</option>
                <option value="Comedy">Comedy</option>
                <option value="Romance">Romance</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Animation">Animation</option>
            </select><br>
            <div id="star_rating" style="margin-bottom: 12px;">
                <span class="star" data-value="1">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="5">&#9733;</span>
                <input type="hidden" id="movieRating" name="movieRating" value="0">
            </div>
            <input type="submit" value="Add Movie">
            <br>
        </form><br>
        <h3>Movie List</h3>
        <table id="movies-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Year</th>
                    <th>Genre</th>
                    <th>Rating</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="body">
            
            </tbody>
        </table>
        <script>
            const KEY = "movies"
            function loadMovies() {
                const raw = localStorage.getItem(KEY);
                return raw ? JSON.parse(raw) : [];
            }

            function saveMovies(movies) {
                localStorage.setItem(KEY, JSON.stringify(movies));
            }

            const stars = document.querySelectorAll('#star_rating .star');
            const ratingInput = document.getElementById('movieRating');
            let currentRating = 0;

            for (const star of stars) {
                star.addEventListener('mouseover', function() {
                    const val = parseInt(this.getAttribute('data-value'));
                    highlightStars(val);
                });
                star.addEventListener('mouseout', function() {
                    highlightStars(currentRating);
                });
                star.addEventListener('click', function() {
                    currentRating = parseInt(this.getAttribute('data-value'));
                    ratingInput.value = currentRating;
                    highlightStars(currentRating);
                });
            }

            function highlightStars(rating) {
                stars.forEach(star => {
                    star.classList.toggle('selected', parseInt(star.getAttribute('data-value')) <= rating);
                });
            }

            // found an alternative sol'n with querySelector + forEach
            function loadMovieList() {
                const movies = loadMovies();
                const tbody = document.getElementById('body');
                tbody.innerHTML = '';

                for (let i = 0; i < movies.length; i++) {
                    const movie = movies[i];
                    // Generate stars for rating
                    const filledStars = '★'.repeat(movie.rating || 0);
                    const emptyStars = '☆'.repeat(5 - (movie.rating || 0));
                    const starsDisplay = filledStars + emptyStars;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${movie.name}</td>
                        <td>${movie.year}</td>
                        <td>${movie.genre}</td>
                        <td>${starsDisplay}</td>
                        <td><button onclick="deleteMovie(${i})">Delete</button></td>
                    `;
                    tbody.appendChild(row);
                }
            }


            function deleteMovie(index) {
                if (window.confirm('Are you sure you want to delete this movie?')) {
                    const movies = loadMovies();
                    movies.splice(index, 1);
                    saveMovies(movies);
                    loadMovieList();
                }
            }

            document.querySelector('form').addEventListener('submit', function(event) {
                event.preventDefault();
                let movies = loadMovies();
                const name = document.getElementById('movieName').value;
                const year = document.getElementById('movieYear').value;
                const genre = document.getElementById('movieGenre').value;
                const rating = parseInt(document.getElementById('movieRating').value, 10);
                let existingIndex = -1;
                for (let i = 0; i < movies.length; i++) {
                    if (movies[i].name && movies[i].name.toLowerCase() === name.toLowerCase()) {
                        existingIndex = i;
                        break;
                    }
                }

                if (existingIndex !== -1) {
                    // Update existing movie
                    var oldMovie = movies[existingIndex];
                    var oldRating = oldMovie.rating || 0;
                    var avgRating = Math.round((oldRating + rating) / 2);
                    movies[existingIndex] = {
                        name: name,
                        year: year,
                        genre: genre,
                        rating: avgRating
                    };
                } else {
                    // Add new movie
                    movies.push({ name: name, year: year, genre: genre, rating: rating });
                }
                saveMovies(movies);
                loadMovieList();
                event.target.reset();
            });
            window.addEventListener('DOMContentLoaded', loadMovieList);
        </script>
    </body>

</html>
